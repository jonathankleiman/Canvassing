name: Daily article monitor

on:
  schedule:
    # GitHub cron is UTC and cannot use dynamic repository variables.
    # These retries cover 7:55pm America/Toronto in both EDT and EST. The
    # script skips early runs and executes the first delivered scheduled run
    # after RUN_TIME_ET for that local day.
    - cron: "55 23 * * *"
    - cron: "*/5 0-4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if it is not currently 2:15pm America/Toronto"
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-article-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ALERT_RECIPIENTS: ${{ vars.ALERT_RECIPIENTS || secrets.ALERT_RECIPIENTS }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL || secrets.ALERT_FROM_EMAIL }}
      RUN_TIME_ET: ${{ vars.RUN_TIME_ET || '14:15' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MONITOR_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Commit monitor state
        run: |
          if [[ -n "$(git status --short data/state.json public/status.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json public/status.json
            git commit -m "Update article monitor state"
            git push
          else
            echo "No monitor state changes to commit."
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
