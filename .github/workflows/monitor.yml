name: Daily article monitor

on:
  schedule:
    # GitHub schedule events are best-effort and may be delayed or dropped.
    # Retry on off-peak minutes all day; the script executes only the first
    # due local-day check after RUN_TIME_ET and skips duplicates.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if it is not currently 2:15pm America/Toronto"
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-article-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ALERT_RECIPIENTS: ${{ vars.ALERT_RECIPIENTS || secrets.ALERT_RECIPIENTS }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL || secrets.ALERT_FROM_EMAIL }}
      RUN_TIME_ET: ${{ vars.RUN_TIME_ET || '14:15' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MONITOR_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - id: monitor_changes
        name: Commit monitor state
        run: |
          if [[ -n "$(git status --short data/state.json public/status.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json public/status.json
            git commit -m "Update article monitor state"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No monitor state changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/configure-pages@v5
        if: steps.monitor_changes.outputs.changed == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.monitor_changes.outputs.changed == 'true'
        with:
          path: public
      - id: deployment
        if: steps.monitor_changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
